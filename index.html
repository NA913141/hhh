<style>
  :root{
    --bg:#F5F2E8;
    --paper:#FFFFFF;
    --ink:#1F3B3E;
    --ink-soft:#4A5F61;
    --line:#D9D2BD;
    --cold:#5B8FA8;
    --cold-deep:#3C6B82;
    --fresh:#4F7A4D;
    --week:#9C8A2E;
    --soon:#C77F1F;
    --urgent:#B0401F;
    --expired:#7A2E2E;
    --none:#8A8478;
    --shadow:0 2px 8px rgba(31,59,62,0.08);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"PingFang TC","Heiti TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:calc(84px + env(safe-area-inset-bottom));
  }
  .mono{font-family:ui-monospace,"SF Mono","Roboto Mono","Courier New",monospace;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;}
 
  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 16px 14px;
    border-bottom:2px dashed var(--line);
    background:var(--bg);
    position:sticky;top:0;z-index:20;
  }
  .topbar .brand{display:flex;align-items:center;gap:8px;}
  .brand .ic{font-size:22px;}
  .brand h1{font-size:17px;margin:0;font-weight:900;letter-spacing:0.5px;}
  .brand .code-pill{
    font-size:11px;color:var(--cold-deep);background:#fff;border:1px solid var(--cold);
    border-radius:20px;padding:2px 9px;margin-left:6px;font-weight:700;
  }
  .icon-btn{
    border:none;background:var(--paper);width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:var(--shadow);cursor:pointer;
  }
 
  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:8px;padding:12px 16px 4px;overflow-x:auto;}
  .tab-chip{
    flex:none;border:1.5px solid var(--line);background:var(--paper);
    color:var(--ink-soft);padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;
    cursor:pointer;white-space:nowrap;
  }
  .tab-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
 
  /* ---------- Stats strip ---------- */
  .stats{display:flex;gap:8px;padding:10px 16px 4px;}
  .stat{
    flex:1;background:var(--paper);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow);
    text-align:center;
  }
  .stat .n{font-size:18px;font-weight:900;font-family:ui-monospace,"SF Mono",monospace;}
  .stat .l{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
  .stat.expired .n{color:var(--expired);}
  .stat.urgent .n{color:var(--urgent);}
  .stat.fresh .n{color:var(--fresh);}
 
  /* ---------- Search / filter ---------- */
  .searchbar{padding:10px 16px 0;display:flex;gap:8px;}
  .searchbar input[type=text]{
    flex:1;border:1.5px solid var(--line);background:var(--paper);border-radius:10px;
    padding:9px 12px;font-size:14px;color:var(--ink);
  }
  .searchbar input:focus{outline:2px solid var(--cold);}
  .cat-filter{display:flex;gap:6px;padding:10px 16px 2px;overflow-x:auto;}
  .cat-chip{
    flex:none;border:1px solid var(--line);background:var(--paper);border-radius:16px;
    padding:5px 10px;font-size:12px;cursor:pointer;color:var(--ink-soft);
  }
  .cat-chip.active{background:var(--cold);border-color:var(--cold);color:#fff;}
 
  /* ---------- Section headers ---------- */
  .section-head{
    display:flex;align-items:center;gap:8px;padding:16px 16px 6px;
    font-size:12.5px;font-weight:800;letter-spacing:0.5px;color:var(--ink-soft);
  }
  .section-head .dot{width:8px;height:8px;border-radius:50%;flex:none;}
 
  /* ---------- Card grid ---------- */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 16px 16px;}
  .card{
    position:relative;background:var(--paper);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:12px 12px 38px;cursor:pointer;
    border:1px solid rgba(31,59,62,0.06);
    min-height:96px;
  }
  .card::before{
    content:"";position:absolute;left:-7px;top:50%;transform:translateY(-50%);
    width:14px;height:14px;border-radius:50%;background:var(--bg);
    border:1px solid var(--line);
  }
  .card .icon{font-size:22px;}
  .card .name{font-weight:800;font-size:14px;margin:6px 0 2px;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .meta{font-size:11px;color:var(--ink-soft);}
  .card .qty{font-size:11px;color:var(--ink-soft);margin-top:1px;}
  .stamp{
    position:absolute;right:8px;bottom:8px;transform:rotate(-4deg);
    border:1.5px solid currentColor;border-radius:6px;padding:2px 6px;
    font-size:10px;font-weight:800;font-family:ui-monospace,"SF Mono",monospace;
    letter-spacing:0.3px;white-space:nowrap;
  }
  .stamp.expired{color:var(--expired);}
  .stamp.urgent{color:var(--urgent);}
  .stamp.soon{color:var(--soon);}
  .stamp.week{color:var(--week);}
  .stamp.fresh{color:var(--fresh);}
  .stamp.none{color:var(--none);}
 
  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 24px;font-size:13.5px;
  }
  .empty .big{font-size:38px;display:block;margin-bottom:8px;}
 
  /* ---------- Location grid (by-layer view) ---------- */
  .loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px 4px;}
  .loc-card{
    background:var(--paper);border-radius:12px;padding:14px 12px;box-shadow:var(--shadow);
    cursor:pointer;border:1.5px solid transparent;
  }
  .loc-card.active{border-color:var(--cold);}
  .loc-card .lt{font-weight:800;font-size:13.5px;}
  .loc-card .lc{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .loc-card .badge{
    display:inline-block;margin-top:6px;background:var(--bg);border-radius:10px;
    padding:2px 8px;font-size:11px;font-weight:800;font-family:ui-monospace,monospace;
  }
 
  /* ---------- FAB ---------- */
  .fab{
    position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--ink);color:#fff;border:none;border-radius:30px;
    padding:13px 26px;font-size:14.5px;font-weight:800;box-shadow:0 6px 16px rgba(31,59,62,0.3);
    display:flex;align-items:center;gap:8px;cursor:pointer;z-index:30;
    white-space:nowrap;
  }
 
  /* ---------- Bottom nav ---------- */
  .bottomnav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    background:var(--paper);
    border-top:2px dashed var(--line);display:flex;z-index:25;
    width:100%;max-width:520px;
  }
  .navbtn{
    flex:1;border:none;background:none;padding:10px 4px calc(12px + env(safe-area-inset-bottom));display:flex;flex-direction:column;
    align-items:center;gap:2px;color:var(--ink-soft);font-size:10.5px;font-weight:700;cursor:pointer;
  }
  .navbtn .ic{font-size:19px;}
  .navbtn.active{color:var(--cold-deep);}
 
  /* ---------- Sheet / modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(31,59,62,0.45);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .overlay.center{align-items:center;padding:16px;}
  .sheet{
    background:var(--bg);width:100%;max-width:520px;border-radius:20px 20px 0 0;
    max-height:90vh;overflow-y:auto;padding:8px 18px 28px;
    animation:slideup .22s ease-out;
  }
  .sheet.card-modal{border-radius:18px;max-height:85vh;}
  @keyframes slideup{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-handle{width:40px;height:4px;background:var(--line);border-radius:4px;margin:8px auto 14px;}
  .sheet h2{font-size:16.5px;font-weight:900;margin:4px 0 14px;display:flex;align-items:center;gap:8px;}
  .sheet .close-x{position:absolute;right:18px;top:14px;font-size:20px;color:var(--ink-soft);cursor:pointer;}
 
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;}
  .field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea{
    width:100%;border:1.5px solid var(--line);background:var(--paper);border-radius:10px;
    padding:10px 12px;font-size:14.5px;color:var(--ink);font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:50px;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .quickdates{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
  .qd-btn{
    border:1px solid var(--cold);background:#fff;color:var(--cold-deep);border-radius:14px;
    padding:5px 10px;font-size:11.5px;cursor:pointer;font-weight:700;
  }
  .qd-btn.unit-btn{border-color:var(--ink-soft);color:var(--ink-soft);}
  .qd-btn.unit-btn.selected{background:var(--ink);color:#fff;border-color:var(--ink);}
  .primary-btn{
    width:100%;background:var(--ink);color:#fff;border:none;border-radius:12px;
    padding:13px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;
  }
  .secondary-btn{
    width:100%;background:var(--paper);color:var(--ink);border:1.5px solid var(--line);border-radius:12px;
    padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;
  }
  .danger-btn{
    width:100%;background:#fff;color:var(--expired);border:1.5px solid var(--expired);border-radius:12px;
    padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;
  }
 
  .method-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:6px;}
  .method-btn{
    display:flex;align-items:center;gap:12px;background:var(--paper);border:1.5px solid var(--line);
    border-radius:14px;padding:14px;cursor:pointer;text-align:left;
  }
  .method-btn .ic{font-size:26px;flex:none;width:36px;text-align:center;}
  .method-btn .tt{font-weight:800;font-size:14.5px;}
  .method-btn .ds{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
 
  .preview-img{width:100%;max-height:220px;object-fit:contain;border-radius:12px;background:#000;margin-bottom:10px;}
  .ai-banner{
    display:flex;align-items:center;gap:8px;background:#fff;border:1px dashed var(--cold);
    border-radius:10px;padding:10px;font-size:12.5px;color:var(--cold-deep);margin-bottom:12px;
  }
  .spinner{
    width:16px;height:16px;border-radius:50%;border:2.5px solid var(--cold);border-top-color:transparent;
    animation:spin .7s linear infinite;flex:none;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
 
  .toast{
    position:fixed;bottom:150px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;
    z-index:90;box-shadow:0 4px 14px rgba(0,0,0,0.25);max-width:80%;text-align:center;
  }
 
  .barcode-deco{
    display:flex;gap:2px;align-items:flex-end;height:18px;margin:4px 0 10px;opacity:0.55;
  }
  .barcode-deco span{display:block;width:2px;background:var(--ink);}
 
  .settings-list{background:var(--paper);border-radius:12px;padding:6px 4px;margin-bottom:14px;}
  .settings-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-bottom:1px solid var(--bg);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row input{
    flex:1;border:none;background:none;font-size:14px;color:var(--ink);padding:4px;font-family:inherit;
  }
  .settings-row .del{color:var(--expired);font-size:18px;cursor:pointer;flex:none;}
  .add-row{display:flex;gap:8px;padding:8px 10px;}
  .add-row input{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:13.5px;}
  .add-row button{border:none;background:var(--cold);color:#fff;border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;}
 
  .help-text{font-size:12px;color:var(--ink-soft);line-height:1.6;padding:0 16px 18px;}
  .onboard-card{
    background:var(--paper);border-radius:18px;padding:24px 20px;box-shadow:var(--shadow);
    border:1.5px solid var(--line);
  }
  .onboard-card h1{font-size:20px;margin:0 0 4px;font-weight:900;}
  .onboard-card .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;line-height:1.6;}
  .seg{display:flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:16px;}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.1);}
  #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;font-size:14px;color:var(--ink-soft);}
  .hidden{display:none !important;}
  .member-tag{
    font-size:10.5px;background:var(--bg);border-radius:10px;padding:1px 7px;color:var(--ink-soft);
    display:inline-block;font-weight:700;
  }
 
  /* ---------- Shopping list ---------- */
  .shop-item{
    background:var(--paper);border-radius:14px;box-shadow:var(--shadow);
    padding:14px 14px 14px 12px;margin:0 16px 10px;
    border:1px solid rgba(31,59,62,0.06);
    display:flex;align-items:flex-start;gap:12px;
    transition:opacity .2s;
  }
  .shop-item.bought{ opacity:0.45; }
  .shop-check{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--line);
    flex:none;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:13px;background:var(--paper);transition:all .15s;
  }
  .shop-check.checked{ background:var(--fresh);border-color:var(--fresh);color:#fff; }
  .shop-body{ flex:1;min-width:0; }
  .shop-name{ font-weight:800;font-size:14px;line-height:1.3; }
  .shop-item.bought .shop-name{ text-decoration:line-through;color:var(--ink-soft); }
  .shop-meta{ font-size:11.5px;color:var(--ink-soft);margin-top:3px;display:flex;flex-wrap:wrap;gap:6px;align-items:center; }
  .shop-urgent{ display:inline-block;background:#FFF0EC;color:var(--urgent);border-radius:8px;padding:1px 7px;font-size:10.5px;font-weight:800; }
  .shop-adder{ font-size:10.5px;color:var(--none); }
  .shop-del{ color:var(--line);font-size:18px;cursor:pointer;flex:none;padding:2px 4px; }
  .shop-del:hover{ color:var(--expired); }
  .shop-section-head{ display:flex;align-items:center;gap:8px;padding:16px 16px 6px;font-size:12px;font-weight:800;color:var(--ink-soft);letter-spacing:0.5px; }
  .shop-section-head .dot{ width:7px;height:7px;border-radius:50%;flex:none; }
  .shop-add-bar{
    margin:8px 16px 16px;background:var(--paper);border-radius:14px;
    box-shadow:var(--shadow);padding:12px 14px;
  }
  .shop-add-bar input[type=text]{
    width:100%;border:1.5px solid var(--line);background:var(--bg);border-radius:10px;
    padding:9px 12px;font-size:14px;color:var(--ink);font-family:inherit;margin-bottom:8px;
  }
  .shop-add-bar input:focus{ outline:2px solid var(--cold); }
  .shop-add-row{ display:flex;gap:8px;align-items:center; }
  .shop-add-row input[type=text]{ flex:1;margin-bottom:0; }
  .shop-urgent-toggle{
    border:1.5px solid var(--line);background:var(--paper);border-radius:8px;
    padding:7px 10px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:700;color:var(--ink-soft);
  }
  .shop-urgent-toggle.on{ border-color:var(--urgent);color:var(--urgent);background:#FFF0EC; }
  .shop-add-btn{
    border:none;background:var(--ink);color:#fff;border-radius:10px;
    padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;
  }
  .shop-history-toggle{
    display:flex;align-items:center;gap:6px;padding:6px 16px 14px;
    font-size:12px;color:var(--ink-soft);cursor:pointer;font-weight:700;
  }
 
 
  .shop-to-fridge{
    border:1px solid var(--fresh);background:#F0FBF0;color:var(--fresh);
    border-radius:8px;padding:3px 7px;font-size:12px;cursor:pointer;white-space:nowrap;
    font-weight:800;
  }
  .shop-to-fridge:hover{ background:var(--fresh);color:#fff; }
 
</style>
</head>

<script>
/* =========================================================
   家冰箱 App — 全部邏輯
   ========================================================= */
 
/* ---------- 設定資料 ---------- */
const CATEGORIES = [
  {id:'veg',     name:'蔬菜',     icon:'🥦', shelfDays:5},
  {id:'fruit',   name:'水果',     icon:'🍎', shelfDays:7},
  {id:'meat',    name:'肉類',     icon:'🥩', shelfDays:3},
  {id:'seafood', name:'海鮮',     icon:'🐟', shelfDays:2},
  {id:'egg',     name:'蛋',       icon:'🥚', shelfDays:21},
  {id:'dairy',   name:'乳製品',   icon:'🥛', shelfDays:7},
  {id:'grain',   name:'主食穀類', icon:'🍚', shelfDays:180},
  {id:'sauce',   name:'醃漬調味', icon:'🧂', shelfDays:180},
  {id:'drink',   name:'飲料',     icon:'🥤', shelfDays:14},
  {id:'cooked',  name:'熟食剩菜', icon:'🍱', shelfDays:2},
  {id:'frozen',  name:'冷凍調理', icon:'🧊', shelfDays:90},
  {id:'snack',   name:'零食甜點', icon:'🍪', shelfDays:60},
  {id:'other',   name:'其他',     icon:'📦', shelfDays:14},
];
const DEFAULT_LOCATIONS = ['冷凍庫上層','冷凍庫下層','冷藏室上層','冷藏室中層','冷藏室下層','蔬果保鮮室','門邊儲物格'];
const QUICK_UNITS = ['個','包','瓶','罐','盒','袋','條','顆','片','份','公克','公斤','毫升','公升'];
 
const STATUS_LABEL = {
  expired:{label:'已過期', color:'var(--expired)', dot:'#7A2E2E'},
  urgent: {label:'今明到期', color:'var(--urgent)', dot:'#B0401F'},
  soon:   {label:'3天內到期', color:'var(--soon)', dot:'#C77F1F'},
  week:   {label:'一週內到期', color:'var(--week)', dot:'#9C8A2E'},
  fresh:  {label:'新鮮', color:'var(--fresh)', dot:'#4F7A4D'},
  none:   {label:'未設期限', color:'var(--none)', dot:'#8A8478'},
};
 
/* ---------- 狀態 ---------- */
let STATE = {
  code:'',
  name:'',
  items:[],
  shoplist:[],   // 購物清單 [{id,name,qty,note,urgent,addedBy,addedAt,bought,boughtBy,boughtAt}]
  locations: DEFAULT_LOCATIONS.slice(),
  customCategories: [],
  view:'overview',          // overview | bylocation | settings | shoplist
  activeLocation:null,
  searchText:'',
  activeCat:'all',
  showBought:false,         // 購物清單：是否顯示已購買
  booted:false,
};
 
/* ---------- 小工具 ---------- */
function genCode(len=6){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function genId(){
  return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
}
function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDaysStr(days){
  const d=new Date();
  d.setDate(d.getDate()+days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return null;
  return Math.round((d-today)/86400000);
}

/* ---------- Storage 後端判斷 ----------
   claude   ：在 Claude 對話視窗內預覽時，使用 Claude 提供的 window.storage（僅供測試，僅這個分頁能看到）
   cloudflare：部署成獨立網站後，若已填寫 CF_WORKER_URL，使用 Cloudflare Worker + KV，全家可跨裝置同步
   local    ：部署成獨立網站但尚未設定後端，資料只存在這支裝置的瀏覽器（localStorage），不會跨裝置共享
---------------------------------------------- */
const IN_CLAUDE_ARTIFACT = (typeof window.storage !== 'undefined');
 
function cfWorkerConfigured(){
  const u = window.CF_WORKER_URL;
  return !!(u && u.trim() && u.startsWith('http'));
}
 
let SHARED_BACKEND = IN_CLAUDE_ARTIFACT ? 'claude' : (cfWorkerConfigured() ? 'cloudflare' : 'local');
let realtimeUnsub = null;
 
async function cfRead(code){
  try{
    const resp = await fetch(window.CF_WORKER_URL + '?code=' + encodeURIComponent(code));
    if(!resp.ok) return null;
    return await resp.json();
  }catch(e){ console.error('cf read failed', e); return null; }
}
 
async function cfWrite(code, record){
  try{
    const resp = await fetch(window.CF_WORKER_URL + '?code=' + encodeURIComponent(code), {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(record)
    });
    return resp.ok;
  }catch(e){ console.error('cf write failed', e); return false; }
}

/* ---------- 共用小工具 ---------- */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
 
async function withRetry(fn, retries=3, delayMs=500){
  let lastErr=null;
  for(let i=0;i<=retries;i++){
    try{
      return await fn();
    }catch(e){
      lastErr=e;
      if(i<retries) await sleep(delayMs*(i+1));
    }
  }
  throw lastErr;
}
 
let PENDING_SYNC = false; // 是否有資料尚未成功同步到雲端
 
function localGet(key){
  try{
    return {ok:true, value: localStorage.getItem('fridge_'+key)};
  }catch(e){
    console.error('localStorage get failed', key, e);
    return {ok:false, value:null};
  }
}
function localSet(key, value){
  try{
    localStorage.setItem('fridge_'+key, value);
    return {ok:true};
  }catch(e){
    console.error('localStorage set failed', key, e);
    return {ok:false};
  }
}
 
function parseSharedKey(key){
  const idx = key.indexOf(':');
  return {type: key.slice(0,idx), code: key.slice(idx+1)};
}
async function firebaseGetShared(key){
  try{
    const {type, code} = parseSharedKey(key);
    const snap = await withRetry(()=> firebaseDb.collection('households').doc(code).get(), 2, 500);
    if(!snap.exists) return {ok:true, value:null};
    const data = snap.data() || {};
    const val = data[type];
    return {ok:true, value: (val!==undefined && val!==null) ? JSON.stringify(val) : null};
  }catch(e){
    console.error('firebase get failed', key, e);
    return {ok:false, value:null};
  }
}
async function firebaseSetShared(key, value){
  try{
    const {type, code} = parseSharedKey(key);
    const parsedValue = JSON.parse(value);
    await withRetry(()=> firebaseDb.collection('households').doc(code).set(
      {[type]: parsedValue, updatedAt: Date.now()}, {merge:true}
    ), 3, 500);
    return {ok:true};
  }catch(e){
    console.error('firebase set failed', key, e);
    return {ok:false};
  }
}
 
/* 個人資料用 localStorage（本機），共享資料用 Cloudflare KV 或 Claude storage */
async function storageGet(key, shared){
  if(!shared){
    if(IN_CLAUDE_ARTIFACT){
      try{
        const r = await withRetry(()=>window.storage.get(key, false), 2, 400);
        return {ok:true, value: r ? r.value : null};
      }catch(e){ return {ok:false, value:null}; }
    }
    return localGet(key);
  }
  if(SHARED_BACKEND==='claude'){
    try{
      const r = await withRetry(()=>window.storage.get(key, true), 2, 400);
      return {ok:true, value: r ? r.value : null};
    }catch(e){ return {ok:false, value:null}; }
  }
  // cloudflare / local：shared 資料透過 loadHousehold 一次讀取，這裡不單獨呼叫
  return localGet(key);
}
async function storageSet(key, value, shared){
  let result;
  if(!shared){
    if(IN_CLAUDE_ARTIFACT){
      try{ await withRetry(()=>window.storage.set(key, value, false), 3, 500); result={ok:true}; }
      catch(e){ result={ok:false}; }
    } else { result = localSet(key, value); }
  } else if(SHARED_BACKEND==='claude'){
    try{ await withRetry(()=>window.storage.set(key, value, true), 3, 500); result={ok:true}; }
    catch(e){ result={ok:false}; }
  } else {
    result = localSet(key, value);
  }
  if(result.ok){ PENDING_SYNC=false; updateSyncIndicator(); }
  else { PENDING_SYNC=true; updateSyncIndicator(); toast('⚠️ 同步失敗，稍後可按🔄重試'); }
  return result.ok ? result : null;
}
function updateSyncIndicator(){
  const btn=document.getElementById('btn-refresh');
  if(btn) btn.textContent = PENDING_SYNC ? '⚠️' : '🔄';
}

  const r = localGet(PROFILE_KEY);

}

async function loadHousehold(code){
  if(SHARED_BACKEND==='cloudflare'){
    const rec = await cfRead(code);
    if(rec===null){ toast('⚠️ 讀取冰箱資料失敗，請稍後按🔄重試'); }
    STATE.items = (rec && Array.isArray(rec.items)) ? rec.items : [];
    STATE.shoplist = (rec && Array.isArray(rec.shoplist)) ? rec.shoplist : [];
    const cfg = rec && rec.config ? rec.config : null;
    if(cfg){
      STATE.locations = (cfg.locations && cfg.locations.length) ? cfg.locations : DEFAULT_LOCATIONS.slice();
      STATE.customCategories = cfg.customCategories || [];
    } else {
      STATE.locations = DEFAULT_LOCATIONS.slice();
      STATE.customCategories = [];
    }
    return;
  }
  // claude / local 模式
  if(SHARED_BACKEND==='claude'){
    const [itemsR, cfgR] = await Promise.all([
      (async()=>{ try{ const r=await withRetry(()=>window.storage.get('items:'+code,true),2,400); return {ok:true,value:r?r.value:null}; }catch(e){ return {ok:false,value:null}; } })(),
      (async()=>{ try{ const r=await withRetry(()=>window.storage.get('config:'+code,true),2,400); return {ok:true,value:r?r.value:null}; }catch(e){ return {ok:false,value:null}; } })()
    ]);
    STATE.items = itemsR.ok ? safeParse(itemsR.value, []) : [];
    const cfg = (cfgR.ok && cfgR.value) ? safeParse(cfgR.value, null) : null;
    if(cfg){ STATE.locations=(cfg.locations&&cfg.locations.length)?cfg.locations:DEFAULT_LOCATIONS.slice(); STATE.customCategories=cfg.customCategories||[]; }
    else { STATE.locations=DEFAULT_LOCATIONS.slice(); STATE.customCategories=[]; }
    return;
  }
  // local
  const itemsR = localGet('fridge_items:'+code);
  const cfgR = localGet('fridge_config:'+code);
  STATE.items = itemsR.ok ? safeParse(itemsR.value, []) : [];
  const cfg = cfgR.ok ? safeParse(cfgR.value, null) : null;
  if(cfg){ STATE.locations=(cfg.locations&&cfg.locations.length)?cfg.locations:DEFAULT_LOCATIONS.slice(); STATE.customCategories=cfg.customCategories||[]; }
  else { STATE.locations=DEFAULT_LOCATIONS.slice(); STATE.customCategories=[]; }
}

function safeParse(raw, fallback){
  if(raw==null) return fallback;
  try{ return JSON.parse(raw); }catch(e){ return fallback; }
}
 
async function _cfWriteAll(){

async function saveItems(){

  if(SHARED_BACKEND==='claude'){

  if(SHARED_BACKEND==='claude'){

async function refreshItemsFromServer(){
  if(SHARED_BACKEND==='cloudflare'){
    const rec = await cfRead(STATE.code);
    if(!rec){ toast('⚠️ 無法取得最新資料，以目前畫面為準'); return; }
    if(Array.isArray(rec.items)) STATE.items = rec.items;
    if(Array.isArray(rec.shoplist)) STATE.shoplist = rec.shoplist;
    if(rec.config){
      if(rec.config.locations && rec.config.locations.length) STATE.locations = rec.config.locations;
      if(rec.config.customCategories) STATE.customCategories = rec.config.customCategories;
    }
    return;
  }
  // claude / local: no-op or localStorage
  if(SHARED_BACKEND==='claude'){
    try{
      const r = await withRetry(()=>window.storage.get('items:'+STATE.code, true), 2, 400);
      if(r && r.value) STATE.items = safeParse(r.value, STATE.items);
    }catch(e){}
  }
}

/* ── 條碼掃描核心：使用 ZXing-js（@zxing/browser），開源、支援 EAN-13/UPC/Code128/QR 等所有常見格式 ── */
let _zxingReader = null;
function getZxingReader(){
  if(!_zxingReader && window.ZXingBrowser){
    _zxingReader = new ZXingBrowser.BrowserMultiFormatReader();
  }
  return _zxingReader;
}
async function decodeBarcodeFromDataUrl(dataUrl){
  const reader = getZxingReader();
  if(!reader) return null;
  try{
    const result = await reader.decodeFromImageUrl(dataUrl);
    return result ? result.getText() : null;
  }catch(e){
    return null; // NotFoundException 等於沒找到，視為正常情況
  }
}
 
function openLiveCameraSheet(mode, onFileReady){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="sheet" style="padding-bottom:20px;">
      <div class="sheet-handle"></div>
      <h2>${mode==='barcode'?'🏷️ 掃描條碼':'📷 拍照辨識'}</h2>
      <div style="position:relative;background:#000;border-radius:12px;overflow:hidden;margin-bottom:12px;max-height:300px;">
        <video id="cam-video" autoplay playsinline muted style="width:100%;display:block;object-fit:cover;"></video>
        ${mode==='barcode'?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <div style="width:70%;aspect-ratio:2;border:3px solid #FFE800;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);"></div>
        </div>`:''}
      </div>
      <canvas id="cam-canvas" style="display:none;"></canvas>
      <div id="cam-status" class="ai-banner" style="margin-bottom:10px;font-size:12px;">📹 啟動攝像頭中…</div>
      <div style="display:flex;gap:8px;">
        <button class="primary-btn" id="cam-snap" style="flex:1;">📸 ${mode==='barcode'?'手動拍攝':'拍攝辨識'}</button>
        <button class="secondary-btn" id="cam-close" style="flex:0 0 72px;">關閉</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
 
  let stream = null;
  let zxingControls = null;
  let scanning = true;
 
  const video = overlay.querySelector('#cam-video');
  const canvas = overlay.querySelector('#cam-canvas');
  const status = overlay.querySelector('#cam-status');
 
  function stopCamera(){
    scanning = false;
    if(zxingControls){ try{ zxingControls.stop(); }catch(e){} zxingControls=null; }
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  }
 
  function getFrame(){
    if(!video.videoWidth) return null;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    return ctx;
  }
 
  function snapToFile(cb){
    getFrame();
    canvas.toBlob(blob=>{ cb(new File([blob], 'capture.jpg', {type:'image/jpeg'})); }, 'image/jpeg', 0.92);
  }
 
  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
      });
      video.srcObject = stream;
      await new Promise(res=>{ video.onloadedmetadata=()=>{ video.play(); res(); }; });
      status.innerHTML = mode==='barcode'
        ? '🎯 對準條碼，自動偵測中…（黃框內）'
        : '📷 攝像頭已開啟，按「拍攝辨識」';
    }catch(e){
      status.innerHTML = `⚠️ 攝像頭開啟失敗：${e.message}<br><small>請改用「選擇圖片」或在 Chrome 地址列允許攝像頭</small>`;
      overlay.querySelector('#cam-snap').disabled = true;
      return;
    }
    if(mode==='barcode') startZxingAutoScan();
  }
 
  function startZxingAutoScan(){
    const reader = getZxingReader();
    if(!reader){
      status.innerHTML = '⚠️ 條碼引擎尚未載入，請改用「選擇圖片」';
      return;
    }
    reader.decodeFromStream(stream, video, (result, err, controls)=>{
      zxingControls = controls;
      if(result && scanning){
        scanning = false;
        const code = result.getText();
        status.innerHTML = `✅ 找到條碼：${escapeHtml(code)}`;
        setTimeout(()=>{
          snapToFile(f=>{
            stopCamera(); overlay.remove();
            if(onFileReady) onFileReady(f, code);
            else handleBarcodeFileWithCode(f, code);
          });
        }, 300);
      }
      // err 在沒掃到時會持續觸發(NotFoundException)，是正常現象，忽略即可
    }).catch(e=>{
      console.error('zxing decodeFromStream failed', e);
      status.innerHTML = '⚠️ 自動掃描啟動失敗，請用「手動拍攝」改走拍照比對流程';
    });
  }
 
  overlay.querySelector('#cam-close').onclick = ()=>{ stopCamera(); overlay.remove(); };
  overlay.addEventListener('click', e=>{ if(e.target===overlay){ stopCamera(); overlay.remove(); } });
 
  overlay.querySelector('#cam-snap').onclick = ()=>{
    overlay.querySelector('#cam-snap').disabled = true;
    status.innerHTML = '<div class="spinner" style="display:inline-block;margin-right:6px;vertical-align:middle;"></div>處理中…';
    snapToFile(file=>{
      stopCamera(); overlay.remove();
      if(onFileReady) onFileReady(file);
      else if(mode==='barcode') handleBarcodeFile(file);
      else handlePhotoFile(file);
    });
  };
 
  startCamera();
}
 
function fileToDataUrl(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function lookupBarcode(code){
  try{
    const resp = await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json');
    const json = await resp.json();
    if(json && json.status===1 && json.product) return json.product;
  }catch(e){}
  return null;
}

  const dataUrl = await fileToDataUrl(file);

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            {type:'text', text: promptText},
            {type:'image', source:{type:'base64', media_type:mediaType, data:base64}}
          ]
        }]
      })
    });
    const data = await response.json();
    const textBlock = (data.content||[]).find(b=>b.type==='text');
    let parsed=null;
    if(textBlock){
      let raw = textBlock.text.trim();
      raw = raw.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
      try{ parsed = JSON.parse(raw); }catch(e){ parsed=null; }
    }
    overlay.remove();
    const draft = blankDraft('photo');
    if(parsed){
      draft.name = parsed.name || '';
      draft.categoryId = catById(parsed.category_id).id || 'other';
      if(parsed.expiry_date_on_package) draft.expiryDate = parsed.expiry_date_on_package;
      else if(typeof parsed.estimated_shelf_life_days==='number') draft.expiryDate = addDaysStr(parsed.estimated_shelf_life_days);
      draft.notes = parsed.notes || '';
    }
    if(onDraftReady){ onDraftReady(draft); }
    else {
      openEditSheet(draft);
      toast(parsed ? '🤖 AI 已初步判斷，請確認並修改' : 'AI 辨識失敗，請手動填寫');
    }
  }catch(e){
    overlay.remove();
    if(onDraftReady){ onDraftReady(blankDraft('photo')); }
    else { toast('辨識時發生錯誤，請手動填寫'); openEditSheet(blankDraft('photo')); }
  }
}

function wireShellEvents(){
  document.getElementById('btn-refresh').onclick = async ()=>{
    if(PENDING_SYNC){
      toast('重試同步中…');
      await saveItems();
      await saveConfig();
      if(!PENDING_SYNC){ await refreshItemsFromServer(); toast('同步成功'); render(); }
    } else {
      toast('重新整理中…');
      await refreshItemsFromServer();
      render();
    }
  };
  document.querySelectorAll('[data-nav]').forEach(b=>{
    b.onclick=()=>{ STATE.view=b.dataset.nav; STATE.activeLocation=null; render(); };
  });
  const fab=document.getElementById('fab-add');
  if(fab) fab.onclick = STATE.view==='shoplist' ? openAddShopMethodSheet : openAddMethodSheet;
 
  const searchInput=document.getElementById('search-input');

      if(item) openEditSheet(Object.assign({}, item, {isNew:false}));
    };

  });
  const back=document.getElementById('back-to-locs');
  if(back) back.onclick=()=>{ STATE.activeLocation=null; render(); };
 
  if(STATE.view==='settings') wireSettingsEvents();
  if(STATE.view==='shoplist') wireShoplistEvents();
}
 
function renderInPlaceList(){
  // 避免每次打字都整頁重繪造成輸入框失焦，只重繪清單區塊
  const container = document.querySelector('.grid, .empty');
  const parent = container ? container.parentNode : null;
  const newHtml = STATE.view==='bylocation' ? renderByLocation() : renderOverview();
  if(parent){
    // 找到目前 grid/empty 之後的所有同層元素需要被取代；簡化做法：重繪整個 body 區塊但保留 input focus
    const activeId = document.activeElement && document.activeElement.id;
    const cursorPos = document.activeElement && document.activeElement.selectionStart;
    render();
    if(activeId==='search-input'){
      const el=document.getElementById('search-input');
      if(el){ el.focus(); if(cursorPos!=null) el.setSelectionRange(cursorPos,cursorPos); }
    }
  }
}

function wireShoplistEvents(){
  let urgentOn = false;
 
  const urgentBtn = document.getElementById('shop-urgent-btn');
  if(urgentBtn){
    urgentBtn.onclick = ()=>{
      urgentOn = !urgentOn;
      urgentBtn.classList.toggle('on', urgentOn);
    };
  }
 
  const addBtn = document.getElementById('shop-add-btn');
  if(addBtn){
    addBtn.onclick = async ()=>{
      const nameEl = document.getElementById('shop-input');
      const noteEl = document.getElementById('shop-note');
      const name = nameEl ? nameEl.value.trim() : '';
      if(!name){ toast('請輸入品項名稱'); return; }
      const note = noteEl ? noteEl.value.trim() : '';
      const newItem = {
        id: genId(), name, note, urgent: urgentOn,
        addedBy: STATE.name, addedAt: new Date().toISOString(),
        bought: false, boughtBy:'', boughtAt:''
      };
      STATE.shoplist.push(newItem);
      await saveShoplist();
      if(nameEl) nameEl.value='';
      if(noteEl) noteEl.value='';
      urgentOn=false;
      render();
      // refocus
      setTimeout(()=>{ const el=document.getElementById('shop-input'); if(el) el.focus(); }, 50);
    };
    // Enter key in name field triggers add
    const nameEl = document.getElementById('shop-input');
    if(nameEl) nameEl.addEventListener('keydown', e=>{ if(e.key==='Enter') addBtn.click(); });
  }
 
  // Check/uncheck
  document.querySelectorAll('[data-shop-check]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const id = el.dataset.shopCheck;
      const idx = STATE.shoplist.findIndex(i=>i.id===id);
      if(idx<0) return;
      STATE.shoplist[idx].bought = !STATE.shoplist[idx].bought;
      if(STATE.shoplist[idx].bought){
        STATE.shoplist[idx].boughtBy = STATE.name;
        STATE.shoplist[idx].boughtAt = new Date().toISOString();
      } else {
        STATE.shoplist[idx].boughtBy = '';
        STATE.shoplist[idx].boughtAt = '';
      }
      await saveShoplist();
      render();
    };
  });
 
  // Delete
  document.querySelectorAll('[data-shop-del]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const id = el.dataset.shopDel;
      STATE.shoplist = STATE.shoplist.filter(i=>i.id!==id);
      await saveShoplist();
      render();
    };
  });
 
  // Add to fridge
  document.querySelectorAll('[data-shop-to-fridge]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const id = el.dataset.shopToFridge;
      const shopItem = STATE.shoplist.find(i=>i.id===id);
      if(shopItem) openAddToFridgeSheet(shopItem);
    };
  });
 
  // Toggle show bought
  const histToggle = document.getElementById('shop-history-toggle');
  if(histToggle){
    histToggle.onclick = ()=>{ STATE.showBought=!STATE.showBought; render(); };
  }
 
  // Clear bought
  const clearBtn = document.getElementById('shop-clear-bought');
  if(clearBtn){
    clearBtn.onclick = async ()=>{
      if(confirm('確定要清除所有已購買的記錄嗎？')){ 
        STATE.shoplist = STATE.shoplist.filter(i=>!i.bought);
        await saveShoplist();
        render();
      }
    };
  }
}

    if(confirm('確定要清空代碼「'+STATE.code+'」的所有食品資料嗎？此動作無法復原。')){
      STATE.items=[];
      await saveItems();
      toast('已清空所有資料');
      render();

/* ---------- 啟動流程 ---------- */
function renderOnboarding(prefillCode, prefillName){
  const app=document.getElementById('app');
  app.innerHTML = `
  <div style="padding:60px 22px;">
    <div class="onboard-card">
      <h1>🧊 家冰箱</h1>
      <div class="sub">家庭共享的冰箱食物記錄。建立一個家庭代碼，家人輸入同一個代碼，就能看到同一份冰箱清單。</div>
      <div class="seg">
        <button id="seg-create" class="active">建立新家庭</button>
        <button id="seg-join">加入家庭</button>
      </div>
      <div class="field" id="code-field" style="${prefillCode?'':'display:none;'}">
        <label>家庭代碼</label>
        <input type="text" id="ob-code" class="mono" value="${escapeHtml(prefillCode||genCode())}" style="text-transform:uppercase;font-weight:800;letter-spacing:2px;">
      </div>
      <div class="field">
        <label>你的名稱</label>
        <input type="text" id="ob-name" placeholder="例如：媽媽、阿明" value="${escapeHtml(prefillName||'')}">
      </div>
      <button class="primary-btn" id="ob-start">開始使用</button>
    </div>
    <p class="help-text" style="text-align:center;padding-top:18px;">📌 代碼會記在這台裝置上，之後開啟自動登入。把代碼分享給家人，他們選「加入家庭」輸入同樣代碼即可。</p>
  </div>`;
  let mode='create';
  const codeField=document.getElementById('code-field');
  document.getElementById('seg-create').onclick=()=>{
    mode='create';
    document.getElementById('seg-create').classList.add('active');
    document.getElementById('seg-join').classList.remove('active');
    document.getElementById('ob-code').value = genCode();
    codeField.style.display='none';
  };
  document.getElementById('seg-join').onclick=()=>{
    mode='join';
    document.getElementById('seg-join').classList.add('active');
    document.getElementById('seg-create').classList.remove('active');
    const codeInput=document.getElementById('ob-code');
    codeInput.value='';
    codeInput.placeholder='輸入家人給你的代碼';
    codeField.style.display='block';
    codeInput.focus();
  };
  document.getElementById('ob-start').onclick=async ()=>{
    const name=document.getElementById('ob-name').value.trim();
    let code=document.getElementById('ob-code').value.trim().toUpperCase();
    if(!code) code=genCode();
    if(!name){ toast('請輸入你的名稱'); return; }
    STATE.code=code; STATE.name=name;
    await saveProfile(code,name);
    await loadHousehold(code);
    STATE.booted=true;
    render();
  };
}
 
async function boot(){
  initBackend();
  document.getElementById('loading-screen').style.display='flex';
  const profile = await loadProfile();
  if(profile && profile.code && profile.name){
    STATE.code=profile.code; STATE.name=profile.name;
    await loadHousehold(profile.code);
    STATE.booted=true;
    document.getElementById('loading-screen').style.display='none';
    render();
  } else {
    document.getElementById('loading-screen').style.display='none';
    renderOnboarding(profile&&profile.code, profile&&profile.name);
  }
}
 
boot();
